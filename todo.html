  <link rel="stylesheet" href="theme.css" />
  <style>
    .wrap { max-width: 560px; margin: 0 auto; padding: 30px 20px 60px; }
    .greeting { text-align: center; margin-bottom: 28px; }
    .greeting h2 { font-size: clamp(24px, 5vw, 30px); font-weight: 800; letter-spacing: -0.035em; }
    .greeting h2 em { font-style: normal; color: var(--gold); }
    .greeting p { font-size: 13.5px; color: var(--muted); margin-top: 4px; }

    .add-row { display: flex; gap: 10px; margin-bottom: 18px; }
    .add-row input { flex: 1; min-width: 0; font-size: 15px; padding: 14px 17px; }
    .add-row .btn { padding: 0 22px; border-radius: 13px; flex-shrink: 0; }

    .filters {
      display: flex; gap: 6px;
      background: var(--card);
      padding: 5px;
      border-radius: 13px;
      margin-bottom: 18px;
      box-shadow: inset 0 1px 3px rgba(26,26,26,0.05);
    }
    .filters button {
      flex: 1; padding: 9px 0;
      border: none; background: transparent; border-radius: 9px;
      font-family: inherit; font-size: 13px; font-weight: 600;
      color: var(--muted); cursor: pointer;
      transition: all 0.2s;
    }
    .filters button.active { background: var(--bg); color: var(--ink); box-shadow: 0 3px 10px -3px rgba(26,26,26,0.14); }

    ul.todos { list-style: none; display: flex; flex-direction: column; gap: 9px; }
    li.todo {
      display: flex; align-items: center; gap: 13px;
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.6);
      border-radius: 16px;
      padding: 14px 16px;
      animation: fadeUp 0.3s both;
      transition: opacity 0.25s, transform 0.2s;
      cursor: grab;
    }
    li.todo.dragging { opacity: 0.4; }
    li.todo .grip { color: var(--gold-soft); flex-shrink: 0; font-size: 14px; letter-spacing: -1px; user-select: none; }
    .checkbox {
      flex-shrink: 0;
      width: 24px; height: 24px;
      border-radius: 9px;
      border: 2px solid var(--gold-soft);
      background: var(--bg);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
    }
    .checkbox:active { transform: scale(0.85); }
    .checkbox svg { opacity: 0; transform: scale(0.5); transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); }
    li.done .checkbox { background: var(--gold); border-color: var(--gold); }
    li.done .checkbox svg { opacity: 1; transform: scale(1); }
    .todo-text {
      flex: 1; min-width: 0;
      font-size: 14.5px; font-weight: 500;
      word-break: break-word;
      transition: color 0.25s;
      position: relative;
    }
    .todo-text::after {
      content: '';
      position: absolute; left: 0; top: 52%;
      height: 1.5px; width: 0;
      background: var(--muted);
      transition: width 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    }
    li.done .todo-text { color: var(--muted); }
    li.done .todo-text::after { width: 100%; }
    .del {
      flex-shrink: 0;
      border: none; background: transparent; cursor: pointer;
      color: var(--muted); font-size: 16px; line-height: 1;
      width: 28px; height: 28px; border-radius: 9px;
      opacity: 0.4;
      transition: all 0.2s;
    }
    li.todo:hover .del { opacity: 1; }
    .del:hover { background: #F7E8E4; color: var(--bad); }

    .meta-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 4px 0;
      font-size: 12.5px; color: var(--muted); font-weight: 500;
    }
    .meta-row button {
      border: none; background: transparent; cursor: pointer;
      font-family: inherit; font-size: 12.5px; font-weight: 600;
      color: var(--gold);
      padding: 4px 8px; border-radius: 8px;
      transition: background 0.2s;
    }
    .meta-row button:hover { background: var(--card); }

    .zero {
      text-align: center; color: var(--muted);
      padding: 48px 20px;
      animation: fadeUp 0.4s both;
    }
    .zero .glyph {
      width: 64px; height: 64px; margin: 0 auto 16px;
      border-radius: 20px; background: var(--card);
      display: flex; align-items: center; justify-content: center;
      box-shadow: var(--shadow);
    }
    .zero h3 { font-size: 16px; font-weight: 700; color: var(--ink); letter-spacing: -0.02em; margin-bottom: 4px; }
    .zero p { font-size: 13px; }
  </style>
</head>
<body>
  <div class="topbar">
    <a class="nav-home" href="./"><svg width="21" height="21" viewBox="0 0 512 512"><circle cx="256" cy="256" r="240" fill="#C8A96E"/><path d="M256 96c52 38 76 96 76 156 0 22-3 43-10 62h-132c-7-19-10-40-10-62 0-60 24-118 76-156z" fill="#FDFAF5"/><circle cx="256" cy="222" r="26" fill="#C8A96E"/><path d="M190 314l-44 56 62-14M322 314l44 56-62-14" fill="#FDFAF5"/><path d="M256 330c14 18 14 48 0 76-14-28-14-58 0-76z" fill="#F0B45C"/></svg><span>Rocket Tools</span></a>
    <span class="nav-sep">/</span>
    <h1 class="nav-title">Todo</h1>
    <div class="spacer"></div>
    <span class="hint">saved to this browser</span>
  </div>

  <div class="wrap">
    <div class="greeting">
      <h2 id="greet">Plan your <em>day.</em></h2>
      <p id="dateline"></p>
    </div>

    <form class="add-row" id="addForm">
      <input class="field" id="addInput" placeholder="Add a task…" maxlength="300" autocomplete="off" />
      <button class="btn btn-gold" type="submit">Add</button>
    </form>

    <div class="filters" id="filters">
      <button data-f="all" class="active">All</button>
      <button data-f="active">Active</button>
      <button data-f="done">Done</button>
    </div>

    <ul class="todos" id="list"></ul>
    <div class="zero" id="zero" hidden>
      <div class="glyph">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#C8A96E" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="5"/><path d="M8.5 12.5l2.5 2.5 5-6"/></svg>
      </div>
      <h3 id="zeroTitle">All clear</h3>
      <p id="zeroSub">Add a task above to get started.</p>
    </div>

    <div class="meta-row" id="metaRow" hidden>
      <span id="counter"></span>
      <button id="clearDone" hidden>Clear completed</button>
    </div>
  </div>

  <script>
    const KEY = 'rocket.todos.v1';
    const $ = (id) => document.getElementById(id);
    let todos = [];
    try { todos = JSON.parse(localStorage.getItem(KEY)) || []; } catch {}
    let filter = 'all';
    let dragId = null;

    const save = () => localStorage.setItem(KEY, JSON.stringify(todos));

    $('dateline').textContent = new Date().toLocaleDateString(undefined, {
      weekday: 'long', month: 'long', day: 'numeric'
    });

    const CHECK = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>';

    function render() {
      const list = $('list');
      list.innerHTML = '';
      const shown = todos.filter(t =>
        filter === 'all' ? true : filter === 'done' ? t.done : !t.done
      );

      for (const t of shown) {
        const li = document.createElement('li');
        li.className = 'todo' + (t.done ? ' done' : '');
        li.draggable = true;
        li.dataset.id = t.id;
        li.innerHTML = '<span class="grip">⠿</span>' +
          '<div class="checkbox" role="checkbox" aria-checked="' + t.done + '">' + CHECK + '</div>' +
          '<div class="todo-text"></div>' +
          '<button class="del" aria-label="Delete">✕</button>';
        li.querySelector('.todo-text').textContent = t.text;
        li.querySelector('.checkbox').onclick = () => { t.done = !t.done; save(); render(); };
        li.querySelector('.del').onclick = () => {
          li.style.opacity = '0'; li.style.transform = 'translateX(14px)';
          setTimeout(() => { todos = todos.filter(x => x.id !== t.id); save(); render(); }, 180);
        };
        li.addEventListener('dragstart', () => { dragId = t.id; li.classList.add('dragging'); });
        li.addEventListener('dragend', () => { dragId = null; li.classList.remove('dragging'); });
        li.addEventListener('dragover', (e) => {
          e.preventDefault();
          if (!dragId || dragId === t.id) return;
          const from = todos.findIndex(x => x.id === dragId);
          const to = todos.findIndex(x => x.id === t.id);
          todos.splice(to, 0, todos.splice(from, 1)[0]);
          save(); render();
        });
        list.appendChild(li);
      }

      const remaining = todos.filter(t => !t.done).length;
      const doneCount = todos.length - remaining;

      $('zero').hidden = shown.length > 0;
      if (!shown.length) {
        if (!todos.length) {
          $('zeroTitle').textContent = 'All clear';
          $('zeroSub').textContent = 'Add a task above to get started.';
        } else if (filter === 'active') {
          $('zeroTitle').textContent = 'Nothing left to do';
          $('zeroSub').textContent = 'Every task is checked off. Lovely.';
        } else {
          $('zeroTitle').textContent = 'Nothing done yet';
          $('zeroSub').textContent = 'Completed tasks will appear here.';
        }
      }

      $('metaRow').hidden = todos.length === 0;
      $('counter').textContent = remaining === 0
        ? 'All ' + todos.length + ' done 🎉'
        : remaining + ' of ' + todos.length + ' remaining';
      $('clearDone').hidden = doneCount === 0;
    }

    $('addForm').onsubmit = (e) => {
      e.preventDefault();
      const text = $('addInput').value.trim();
      if (!text) return;
      todos.unshift({ id: crypto.randomUUID(), text, done: false, created: Date.now() });
      $('addInput').value = '';
      save(); render();
    };

    $('filters').onclick = (e) => {
      const b = e.target.closest('button[data-f]');
      if (!b) return;
      filter = b.dataset.f;
      document.querySelectorAll('#filters button').forEach(x => x.classList.toggle('active', x === b));
      render();
    };

    $('clearDone').onclick = () => {
      todos = todos.filter(t => !t.done);
      save(); render();
    };

    render();

    if ('serviceWorker' in navigator && location.protocol !== 'file:') {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
    }
  </script>
</body>
</html>
