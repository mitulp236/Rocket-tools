<html lang="en">

  <link rel="stylesheet" href="theme.css" />
  <style>
    .wrap { max-width: 880px; margin: 0 auto; padding: 24px 20px 60px; }
    .mode-switch {
      display: flex; background: var(--card); border-radius: 15px; padding: 5px;
      margin-bottom: 24px; box-shadow: inset 0 1px 3px rgba(26,26,26,0.05);
      max-width: 320px; margin-left: auto; margin-right: auto;
    }
    .mode-switch button {
      flex: 1; padding: 11px 0; border: none; background: transparent; border-radius: 11px;
      font-family: inherit; font-size: 14px; font-weight: 600; color: var(--muted);
      cursor: pointer; transition: all 0.22s;
    }
    .mode-switch button.active { background: var(--bg); color: var(--ink); box-shadow: 0 3px 10px -3px rgba(26,26,26,0.14); }

    .gen { display: grid; grid-template-columns: 1fr 320px; gap: 18px; }
    @media (max-width: 760px) { .gen { grid-template-columns: 1fr; } }
    .panel { background: var(--card); border-radius: var(--radius); border: 1px solid rgba(255,255,255,0.6); box-shadow: var(--shadow); padding: 22px; }

    .type-chips { display: flex; gap: 7px; margin-bottom: 18px; flex-wrap: wrap; }
    .type-chips button {
      border: 1.5px solid var(--line); background: var(--bg);
      font-family: inherit; font-size: 12.5px; font-weight: 600; color: var(--muted);
      padding: 8px 16px; border-radius: 99px; cursor: pointer; transition: all 0.2s;
    }
    .type-chips button.active { border-color: var(--gold); color: var(--ink); background: #F4EFE4; }

    .fields { display: flex; flex-direction: column; gap: 10px; }
    .fields label { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: -4px; }
    .fields input, .fields textarea, .fields select {
      font-family: inherit; font-size: 14px;
      background: var(--bg); color: var(--ink);
      border: 1.5px solid var(--line); border-radius: 12px;
      padding: 11px 14px;
    }
    .fields textarea { resize: vertical; min-height: 70px; }
    .fields input:focus, .fields textarea:focus, .fields select:focus { outline: none; border-color: var(--gold); }
    .opt-row { display: flex; gap: 10px; }
    .opt-row > * { flex: 1; }

    .qr-side { display: flex; flex-direction: column; align-items: center; gap: 16px; }
    #qrBox {
      background: #fff; border-radius: 18px; padding: 16px;
      box-shadow: 0 12px 32px -12px rgba(26,26,26,0.25);
      line-height: 0;
    }
    #qrBox canvas { width: 240px; height: 240px; image-rendering: pixelated; border-radius: 6px; }
    .qr-btns { display: flex; gap: 9px; width: 100%; }
    .qr-btns .btn { flex: 1; }
    .qr-err { color: var(--bad); font-size: 12.5px; text-align: center; }

    /* scanner */
    .scan { max-width: 560px; margin: 0 auto; }
    #video {
      width: 100%; border-radius: 18px; background: #111;
      box-shadow: var(--shadow);
      display: none;
    }
    .scan-actions { display: flex; gap: 10px; margin: 16px 0; flex-wrap: wrap; }
    .scan-actions .btn { flex: 1; min-width: 150px; }
    .result {
      background: var(--card); border-radius: 16px; padding: 18px 20px;
      border: 1px solid rgba(255,255,255,0.6); box-shadow: var(--shadow);
      margin-top: 8px;
      animation: fadeUp 0.3s both;
    }
    .result .lab { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); margin-bottom: 6px; }
    .result .val { font-family: var(--mono); font-size: 13.5px; word-break: break-all; margin-bottom: 14px; }
    .result .btns { display: flex; gap: 8px; }
    .scan-hint { text-align: center; color: var(--muted); font-size: 12.5px; margin-top: 14px; }
  </style>
</head>
<body>
  <div class="topbar">
    <a class="nav-home" href="./"><svg width="21" height="21" viewBox="0 0 512 512"><circle cx="256" cy="256" r="240" fill="#C8A96E"/><path d="M256 96c52 38 76 96 76 156 0 22-3 43-10 62h-132c-7-19-10-40-10-62 0-60 24-118 76-156z" fill="#FDFAF5"/><circle cx="256" cy="222" r="26" fill="#C8A96E"/><path d="M190 314l-44 56 62-14M322 314l44 56-62-14" fill="#FDFAF5"/><path d="M256 330c14 18 14 48 0 76-14-28-14-58 0-76z" fill="#F0B45C"/></svg><span>Rocket Tools</span></a>
    <span class="nav-sep">/</span>
    <h1 class="nav-title">QR Codes</h1>
    <div class="spacer"></div>
    <span class="hint">generated &amp; scanned locally</span>
  </div>

  <div class="wrap">
    <div class="mode-switch">
      <button id="tabGen" class="active">Generate</button>
      <button id="tabScan">Scan</button>
    </div>

    <!-- GENERATE -->
    <div class="gen" id="genView">
      <div class="panel">
        <div class="type-chips" id="chips">
          <button data-t="text" class="active">Text / URL</button>
          <button data-t="wifi">Wi-Fi</button>
          <button data-t="vcard">Contact</button>
        </div>

        <div class="fields" data-form="text">
          <label>Content</label>
          <textarea id="f_text" placeholder="https://example.com or any text…">https://example.com</textarea>
        </div>

        <div class="fields" data-form="wifi" hidden>
          <label>Network name (SSID)</label><input id="f_ssid" placeholder="MyHomeWifi" />
          <label>Password</label><input id="f_pass" placeholder="••••••••" />
          <label>Security</label>
          <select id="f_sec"><option value="WPA">WPA / WPA2 / WPA3</option><option value="WEP">WEP</option><option value="nopass">Open (no password)</option></select>
        </div>

        <div class="fields" data-form="vcard" hidden>
          <label>Full name</label><input id="f_name" placeholder="Ada Lovelace" />
          <label>Phone</label><input id="f_tel" placeholder="+1 555 0100" />
          <label>Email</label><input id="f_email" placeholder="ada@example.com" />
          <label>Organisation</label><input id="f_org" placeholder="Analytical Engines Ltd" />
          <label>Website</label><input id="f_url" placeholder="https://…" />
        </div>

        <div class="fields" style="margin-top:16px">
          <div class="opt-row">
            <div><label>Error correction</label><select id="f_ecc"><option value="M">Medium</option><option value="L">Low</option><option value="Q">Quartile</option><option value="H">High (logo-safe)</option></select></div>
            <div><label>Size</label><select id="f_size"><option value="512">512 px</option><option value="1024" selected>1024 px</option><option value="2048">2048 px</option></select></div>
          </div>
        </div>
      </div>

      <div class="qr-side">
        <div id="qrBox"><canvas id="qrCanvas"></canvas></div>
        <div class="qr-err" id="qrErr"></div>
        <div class="qr-btns">
          <button class="btn btn-gold" id="dlPng">⬇ PNG</button>
          <button class="btn btn-ghost" id="dlSvg">⬇ SVG</button>
        </div>
      </div>
    </div>

    <!-- SCAN -->
    <div class="scan" id="scanView" hidden>
      <video id="video" playsinline muted></video>
      <div class="scan-actions">
        <button class="btn btn-gold" id="camBtn">📷 Start camera</button>
        <button class="btn btn-ghost" id="imgBtn">Scan an image file</button>
      </div>
      <input type="file" id="imgPick" accept="image/*" hidden />
      <div class="result" id="result" hidden>
        <div class="lab">Decoded</div>
        <div class="val" id="resVal"></div>
        <div class="btns">
          <button class="btn btn-ghost btn-sm" id="resCopy">Copy</button>
          <a class="btn btn-gold btn-sm" id="resOpen" target="_blank" rel="noopener" hidden>Open link</a>
        </div>
      </div>
      <div class="scan-hint" id="scanHint">Point your camera at a QR code, or scan a screenshot — decoding happens on-device.</div>
    </div>
  </div>

  <div id="toast" class="toast" hidden></div>

  <script src="https://unpkg.com/qrcode-generator@1.4.4/qrcode.js"></script>
  <script src="https://unpkg.com/jsqr@1.4.0/dist/jsQR.js"></script>
  <script>
    const $ = (id) => document.getElementById(id);
    let toastTimer;
    function toast(msg) {
      const t = $('toast');
      t.textContent = msg; t.hidden = false;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.hidden = true, 2200);
    }

    /* ── tabs ── */
    $('tabGen').onclick = () => switchTab(true);
    $('tabScan').onclick = () => switchTab(false);
    function switchTab(gen) {
      $('tabGen').classList.toggle('active', gen);
      $('tabScan').classList.toggle('active', !gen);
      $('genView').hidden = !gen;
      $('scanView').hidden = gen;
      if (gen) stopCamera();
    }

    /* ── generator ── */
    let type = 'text', qrObj = null;
    $('chips').onclick = (e) => {
      const b = e.target.closest('[data-t]');
      if (!b) return;
      type = b.dataset.t;
      document.querySelectorAll('#chips button').forEach(x => x.classList.toggle('active', x === b));
      document.querySelectorAll('[data-form]').forEach(f => f.hidden = f.dataset.form !== type);
      regen();
    };

    const wifiEsc = (s) => s.replace(/([\\;,:"])/g, '\\$1');
    function payload() {
      if (type === 'wifi') {
        const sec = $('f_sec').value;
        return 'WIFI:T:' + sec + ';S:' + wifiEsc($('f_ssid').value) +
          (sec === 'nopass' ? '' : ';P:' + wifiEsc($('f_pass').value)) + ';;';
      }
      if (type === 'vcard') {
        const L = ['BEGIN:VCARD', 'VERSION:3.0'];
        if ($('f_name').value) L.push('FN:' + $('f_name').value);
        if ($('f_tel').value) L.push('TEL:' + $('f_tel').value);
        if ($('f_email').value) L.push('EMAIL:' + $('f_email').value);
        if ($('f_org').value) L.push('ORG:' + $('f_org').value);
        if ($('f_url').value) L.push('URL:' + $('f_url').value);
        L.push('END:VCARD');
        return L.join('\n');
      }
      return $('f_text').value;
    }

    function regen() {
      const text = payload();
      const err = $('qrErr');
      if (!text.trim()) { err.textContent = 'Enter some content to encode.'; return; }
      try {
        qrObj = qrcode(0, $('f_ecc').value);
        qrObj.addData(text);
        qrObj.make();
        err.textContent = '';
        drawCanvas($('qrCanvas'), qrObj, 240 * (window.devicePixelRatio || 1));
      } catch (e) {
        err.textContent = 'Content too long for a QR code — shorten it or lower error correction.';
        qrObj = null;
      }
    }

    function drawCanvas(canvas, qr, px) {
      const n = qr.getModuleCount();
      const quiet = 4;
      const cell = Math.floor(px / (n + quiet * 2)) || 1;
      const size = cell * (n + quiet * 2);
      canvas.width = canvas.height = size;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#FFFFFF';
      ctx.fillRect(0, 0, size, size);
      ctx.fillStyle = '#1A1A1A';
      for (let r = 0; r < n; r++)
        for (let c = 0; c < n; c++)
          if (qr.isDark(r, c)) ctx.fillRect((c + quiet) * cell, (r + quiet) * cell, cell, cell);
    }

    document.querySelectorAll('.fields input, .fields textarea, .fields select').forEach(el => {
      el.addEventListener('input', regen);
    });

    $('dlPng').onclick = () => {
      if (!qrObj) return toast('Nothing to download yet');
      const c = document.createElement('canvas');
      drawCanvas(c, qrObj, +$('f_size').value);
      c.toBlob((blob) => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'qr-code.png';
        a.click();
        setTimeout(() => URL.revokeObjectURL(a.href), 5000);
        toast('PNG downloaded');
      }, 'image/png');
    };

    $('dlSvg').onclick = () => {
      if (!qrObj) return toast('Nothing to download yet');
      const svg = qrObj.createSvgTag({ cellSize: 8, margin: 32 })
        .replace('<svg ', '<svg xmlns="http://www.w3.org/2000/svg" ');
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([svg], { type: 'image/svg+xml' }));
      a.download = 'qr-code.svg';
      a.click();
      setTimeout(() => URL.revokeObjectURL(a.href), 5000);
      toast('SVG downloaded');
    };

    /* ── scanner ── */
    let stream = null, scanRaf = null;
    const video = $('video');

    $('camBtn').onclick = async () => {
      if (stream) return stopCamera();
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        video.srcObject = stream;
        video.style.display = 'block';
        await video.play();
        $('camBtn').textContent = '⏹ Stop camera';
        scanLoop();
      } catch {
        toast('Camera unavailable or permission denied');
      }
    };

    function stopCamera() {
      if (scanRaf) cancelAnimationFrame(scanRaf);
      if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
      video.style.display = 'none';
      $('camBtn').textContent = '📷 Start camera';
    }

    function scanLoop() {
      if (!stream) return;
      if (video.readyState >= 2) {
        const c = document.createElement('canvas');
        c.width = video.videoWidth; c.height = video.videoHeight;
        const ctx = c.getContext('2d');
        ctx.drawImage(video, 0, 0);
        const code = jsQR(ctx.getImageData(0, 0, c.width, c.height).data, c.width, c.height);
        if (code && code.data) { showResult(code.data); stopCamera(); return; }
      }
      scanRaf = requestAnimationFrame(scanLoop);
    }

    $('imgBtn').onclick = () => $('imgPick').click();
    $('imgPick').onchange = async (e) => {
      const file = e.target.files[0];
      e.target.value = '';
      if (!file) return;
      const bmp = await createImageBitmap(file);
      const c = document.createElement('canvas');
      c.width = bmp.width; c.height = bmp.height;
      const ctx = c.getContext('2d');
      ctx.drawImage(bmp, 0, 0);
      const code = jsQR(ctx.getImageData(0, 0, c.width, c.height).data, c.width, c.height);
      if (code && code.data) showResult(code.data);
      else toast('No QR code found in that image');
    };

    function showResult(data) {
      $('result').hidden = false;
      $('resVal').textContent = data;
      const isUrl = /^https?:\/\//i.test(data.trim());
      $('resOpen').hidden = !isUrl;
      if (isUrl) $('resOpen').href = data.trim();
      $('scanHint').textContent = 'Scan another any time.';
      toast('QR code decoded');
    }
    $('resCopy').onclick = async () => { await navigator.clipboard.writeText($('resVal').textContent); toast('Copied'); };

    window.addEventListener('pagehide', stopCamera);
    regen();

    if ('serviceWorker' in navigator && location.protocol !== 'file:') {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
    }
  </script>
</body>
</html>
