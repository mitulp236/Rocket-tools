  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef, useCallback } = React;

    /* ───────────────────────── constants ───────────────────────── */

    const CHUNK_SIZE = 64 * 1024;            // 64KB chunks
    const BUF_HIGH = 8 * 1024 * 1024;        // pause sending above 8MB buffered
    const BUF_LOW = 1 * 1024 * 1024;         // resume below 1MB
    const ID_PREFIX = 'pdrp-v1-';            // namespace on the public PeerJS server
    const CODE_CHARS = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // no O/0/I/1 ambiguity

    /* ───────────────────────── helpers ───────────────────────── */

    const genCode = () =>
      Array.from(crypto.getRandomValues(new Uint8Array(6)))
        .map(b => CODE_CHARS[b % CODE_CHARS.length]).join('');

    const fmtBytes = (n) => {
      if (!n && n !== 0) return '—';
      if (n < 1024) return n + ' B';
      const u = ['KB', 'MB', 'GB', 'TB'];
      let i = -1;
      do { n /= 1024; i++; } while (n >= 1024 && i < u.length - 1);
      return n.toFixed(n >= 100 ? 0 : n >= 10 ? 1 : 2) + ' ' + u[i];
    };

    const fmtEta = (s) => {
      if (!isFinite(s) || s < 0) return '—';
      if (s < 1) return '<1s';
      if (s < 60) return Math.ceil(s) + 's';
      if (s < 3600) return Math.floor(s / 60) + 'm ' + Math.round(s % 60) + 's';
      return Math.floor(s / 3600) + 'h ' + Math.round((s % 3600) / 60) + 'm';
    };

    const shareLink = (code) =>
      location.origin + location.pathname + '?code=' + code;

    // Rolling-window throughput meter
    function makeSpeedMeter() {
      const samples = [];
      return {
        push(totalBytes) {
          const now = performance.now();
          samples.push({ t: now, b: totalBytes });
          while (samples.length > 2 && now - samples[0].t > 3000) samples.shift();
        },
        bps() {
          if (samples.length < 2) return 0;
          const a = samples[0], z = samples[samples.length - 1];
          const dt = (z.t - a.t) / 1000;
          return dt > 0.2 ? (z.b - a.b) / dt : 0;
        },
      };
    }

    function newPeer(id) {
      // Public PeerJS cloud — signaling only; file bytes go peer-to-peer.
      return new Peer(id, { debug: 1 });
    }

    /* ───────────────────────── icons ───────────────────────── */

    const Icon = {
      up: (c = 'var(--gold)', s = 28) => (
        <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M12 19V5" /><path d="M5 12l7-7 7 7" />
        </svg>
      ),
      file: (c = '#fff', s = 22) => (
        <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" /><path d="M14 2v6h6" />
        </svg>
      ),
      check: (c = '#fff', s = 36) => (
        <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2.6" strokeLinecap="round" strokeLinejoin="round">
          <path d="M20 6L9 17l-5-5" />
        </svg>
      ),
      copy: (c = 'currentColor', s = 17) => (
        <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2" /><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
        </svg>
      ),
      down: (c = 'currentColor', s = 17) => (
        <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M12 5v14" /><path d="M19 12l-7 7-7-7" />
        </svg>
      ),
    };

    /* ───────────────────────── shared UI ───────────────────────── */

    function Toast({ msg }) {
      return msg ? <div className="toast">{msg}</div> : null;
    }

    function FileMeta({ name, size }) {
      return (
        <div className="filemeta">
          <div className="fm-icon">{Icon.file()}</div>
          <div>
            <div className="fm-name">{name}</div>
            <div className="fm-size">{fmtBytes(size)}</div>
          </div>
        </div>
      );
    }

    function ProgressPanel({ bytes, total, bps }) {
      const pct = total > 0 ? Math.min(100, (bytes / total) * 100) : 0;
      const eta = bps > 0 ? (total - bytes) / bps : Infinity;
      return (
        <div className="progress-wrap">
          <div className="pct-big">{pct.toFixed(pct >= 99.95 ? 0 : 1)}<span>%</span></div>
          <div className="progress-track">
            <div className="progress-fill" style={{ width: pct + '%' }} />
          </div>
          <div className="stats">
            <span><b>{fmtBytes(bps)}/s</b></span>
            <span><b>{fmtBytes(bytes)}</b> / {fmtBytes(total)}</span>
            <span>ETA <b>{fmtEta(eta)}</b></span>
          </div>
        </div>
      );
    }

    /* ───────────────────────── sender ───────────────────────── */

    function SendFlow({ toast }) {
      const [phase, setPhase] = useState('pick'); // pick | starting | waiting | transfer | done | error
      const [file, setFile] = useState(null);
      const [code, setCode] = useState('');
      const [sent, setSent] = useState(0);
      const [bps, setBps] = useState(0);
      const [error, setError] = useState('');
      const [drag, setDrag] = useState(false);
      const peerRef = useRef(null);
      const aliveRef = useRef(true);
      const inputRef = useRef(null);

      useEffect(() => () => {
        aliveRef.current = false;
        peerRef.current?.destroy();
      }, []);

      const fail = (msg) => { setError(msg); setPhase('error'); peerRef.current?.destroy(); };

      const startSharing = (f) => {
        setFile(f);
        setPhase('starting');
        openRoom(f, 0);
      };

      const openRoom = (f, attempt) => {
        if (attempt > 4) return fail('Could not reserve a room code. Please try again.');
        const c = genCode();
        const peer = newPeer(ID_PREFIX + c);
        peerRef.current = peer;

        peer.on('open', () => {
          if (!aliveRef.current) return;
          setCode(c);
          setPhase('waiting');
        });
        peer.on('error', (err) => {
          if (!aliveRef.current) return;
          if (err.type === 'unavailable-id') {
            peer.destroy();
            openRoom(f, attempt + 1); // code collision — roll a new one
          } else if (err.type === 'network' || err.type === 'server-error') {
            fail('Cannot reach the signaling server. Check your connection and retry.');
          }
        });
        peer.on('connection', (conn) => {
          if (!aliveRef.current) return;
          serveReceiver(conn, f);
        });
      };

      const serveReceiver = (conn, f) => {
        let started = false;
        conn.on('open', () => {
          conn.send({ type: 'meta', name: f.name, size: f.size, mime: f.type || 'application/octet-stream' });
        });
        conn.on('data', (msg) => {
          if (msg && msg.type === 'ready' && !started) {
            started = true;
            setPhase('transfer');
            streamFile(conn, f);
          } else if (msg && msg.type === 'complete') {
            setPhase('done');
            conn.close();
          }
        });
        conn.on('close', () => {
          if (aliveRef.current && started) {
            setPhase(p => (p === 'transfer' ? 'error' : p));
            setError(e => e || 'The receiver disconnected mid-transfer.');
          }
        });
      };

      const streamFile = async (conn, f) => {
        const meter = makeSpeedMeter();
        const dc = conn.dataChannel;
        dc.bufferedAmountLowThreshold = BUF_LOW;
        let offset = 0;
        try {
          while (offset < f.size && aliveRef.current && conn.open) {
            if (dc.bufferedAmount > BUF_HIGH) {
              await new Promise((res) => {
                const h = () => { dc.removeEventListener('bufferedamountlow', h); res(); };
                dc.addEventListener('bufferedamountlow', h);
                setTimeout(h, 1500); // safety valve
              });
              continue;
            }
            const buf = await f.slice(offset, offset + CHUNK_SIZE).arrayBuffer();
            conn.send(buf);
            offset += buf.byteLength;
            const delivered = Math.max(0, offset - dc.bufferedAmount);
            meter.push(delivered);
            setSent(delivered);
            setBps(meter.bps());
          }
          if (offset >= f.size && conn.open) {
            // flush remaining buffer before signaling done
            while (dc.bufferedAmount > 0 && conn.open) {
              await new Promise(r => setTimeout(r, 100));
              const delivered = f.size - dc.bufferedAmount;
              meter.push(delivered);
              setSent(delivered);
              setBps(meter.bps());
            }
            setSent(f.size);
            conn.send({ type: 'done' });
          }
        } catch (e) {
          if (aliveRef.current) fail('Transfer interrupted: ' + e.message);
        }
      };

      const onDrop = (e) => {
        e.preventDefault();
        setDrag(false);
        const f = e.dataTransfer.files?.[0];
        if (f) startSharing(f);
      };

      const copy = async (text, label) => {
        try {
          await navigator.clipboard.writeText(text);
          toast(label + ' copied');
        } catch {
          toast('Copy failed — copy manually');
        }
      };

      /* — render — */

      if (phase === 'pick' || phase === 'starting') return (
        <div className="fade-in">
          <h1 className="hero">Send files <em>directly.</em><br />No cloud between.</h1>
          <p className="sub">Pick a file of any size. It streams straight to the other device — never touching a server.</p>
          <div
            className={'dropzone' + (drag ? ' drag' : '')}
            onClick={() => inputRef.current?.click()}
            onDragOver={(e) => { e.preventDefault(); setDrag(true); }}
            onDragLeave={() => setDrag(false)}
            onDrop={onDrop}
          >
            <div className="dz-icon">{Icon.up()}</div>
            <div className="dz-title">{phase === 'starting' ? 'Creating room…' : 'Drop a file here'}</div>
            <div className="dz-hint">{phase === 'starting' ? 'Reserving your code' : 'or tap to browse — any size'}</div>
          </div>
          <input ref={inputRef} type="file" hidden onChange={(e) => e.target.files?.[0] && startSharing(e.target.files[0])} />
        </div>
      );

      if (phase === 'waiting') return (
        <div className="card fade-in">
          <FileMeta name={file.name} size={file.size} />
          <div className="code-label">Share this code</div>
          <div className="code-row">
            {code.split('').map((ch, i) => <div key={i} className="code-char">{ch}</div>)}
          </div>
          <button className="btn btn-dark" onClick={() => copy(shareLink(code), 'Link')}>
            {Icon.copy()} Copy share link
          </button>
          <button className="btn btn-ghost" onClick={() => copy(code, 'Code')}>
            Copy code only
          </button>
          <div className="waiting"><span className="pulse" /> Waiting for receiver — keep this tab open</div>
        </div>
      );

      if (phase === 'transfer') return (
        <div className="card fade-in">
          <FileMeta name={file.name} size={file.size} />
          <ProgressPanel bytes={sent} total={file.size} bps={bps} />
          <div className="waiting"><span className="pulse" /> Streaming peer-to-peer…</div>
        </div>
      );

      if (phase === 'done') return (
        <div className="card fade-in">
          <div className="done-icon">{Icon.check()}</div>
          <div className="done-title">Delivered</div>
          <div className="done-sub">{file.name} · {fmtBytes(file.size)} reached the other device.</div>
          <button className="btn btn-dark" onClick={() => location.assign(location.pathname)}>Send another file</button>
        </div>
      );

      return (
        <div className="card fade-in">
          <div className="status-banner status-error">{error || 'Something went wrong.'}</div>
          <button className="btn btn-dark" onClick={() => location.assign(location.pathname)}>Start over</button>
        </div>
      );
    }

    /* ───────────────────────── receiver ───────────────────────── */

    function ReceiveFlow({ initialCode, toast }) {
      const [phase, setPhase] = useState(initialCode ? 'connecting' : 'enter');
      // enter | connecting | offer | transfer | done | error
      const [digits, setDigits] = useState(Array(6).fill(''));
      const [meta, setMeta] = useState(null);
      const [received, setReceived] = useState(0);
      const [bps, setBps] = useState(0);
      const [error, setError] = useState('');
      const [savedToDisk, setSavedToDisk] = useState(false);
      const peerRef = useRef(null);
      const connRef = useRef(null);
      const aliveRef = useRef(true);
      const stateRef = useRef({ chunks: [], bytes: 0, writer: null, writeQ: Promise.resolve(), meter: null, meta: null });
      const inputsRef = useRef([]);

      useEffect(() => () => {
        aliveRef.current = false;
        peerRef.current?.destroy();
      }, []);

      useEffect(() => {
        if (initialCode) connect(initialCode);
      }, []);

      const fail = (msg) => {
        if (!aliveRef.current) return;
        setError(msg);
        setPhase('error');
        peerRef.current?.destroy();
      };

      const connect = (code) => {
        setPhase('connecting');
        const peer = newPeer(); // random id for receiver
        peerRef.current = peer;

        peer.on('open', () => {
          if (!aliveRef.current) return;
          const conn = peer.connect(ID_PREFIX + code.toUpperCase(), { reliable: true });
          connRef.current = conn;
          conn.on('data', (data) => onData(conn, data));
          conn.on('error', () => fail('Connection failed. Are both devices online?'));
          conn.on('close', () => {
            if (aliveRef.current) {
              setPhase(p => {
                if (p === 'transfer') { setError('Sender disconnected mid-transfer.'); return 'error'; }
                if (p === 'connecting' || p === 'offer') { setError('The sender closed the room.'); return 'error'; }
                return p;
              });
            }
          });
        });
        peer.on('error', (err) => {
          if (err.type === 'peer-unavailable') fail('No active room for that code. Double-check it with the sender.');
          else if (err.type === 'network' || err.type === 'server-error') fail('Cannot reach the signaling server. Check your connection.');
        });
      };

      const onData = (conn, data) => {
        const st = stateRef.current;
        if (data instanceof ArrayBuffer || ArrayBuffer.isView(data)) {
          const buf = data instanceof ArrayBuffer ? data : data.buffer.slice(data.byteOffset, data.byteOffset + data.byteLength);
          st.bytes += buf.byteLength;
          if (st.writer) {
            st.writeQ = st.writeQ.then(() => st.writer.write(new Uint8Array(buf))).catch(() => {});
          } else {
            st.chunks.push(buf);
          }
          st.meter.push(st.bytes);
          setReceived(st.bytes);
          setBps(st.meter.bps());
          return;
        }
        if (data && data.type === 'meta') {
          st.meta = data;
          setMeta(data);
          setPhase('offer');
        } else if (data && data.type === 'done') {
          finalize(conn);
        }
      };

      const accept = async () => {
        const st = stateRef.current;
        st.meter = makeSpeedMeter();
        // Stream straight to disk when the browser allows it (true no-size-limit);
        // otherwise buffer in memory and save as a Blob at the end.
        if (window.showSaveFilePicker) {
          try {
            const handle = await window.showSaveFilePicker({ suggestedName: st.meta.name });
            st.writer = await handle.createWritable();
            setSavedToDisk(true);
          } catch (e) {
            if (e.name === 'AbortError') return; // user cancelled the picker
          }
        }
        setPhase('transfer');
        connRef.current.send({ type: 'ready' });
      };

      const finalize = async (conn) => {
        const st = stateRef.current;
        if (st.writer) {
          await st.writeQ;
          await st.writer.close();
        } else {
          const blob = new Blob(st.chunks, { type: st.meta.mime });
          st.chunks = [];
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = st.meta.name;
          document.body.appendChild(a);
          a.click();
          a.remove();
          setTimeout(() => URL.revokeObjectURL(url), 20000);
        }
        setReceived(st.meta.size);
        conn.send({ type: 'complete' });
        setPhase('done');
        setTimeout(() => peerRef.current?.destroy(), 500);
      };

      /* — code entry — */

      const setDigit = (i, val) => {
        const chars = val.toUpperCase().replace(/[^A-Z0-9]/g, '').split('');
        const next = [...digits];
        if (chars.length === 0) { next[i] = ''; setDigits(next); return; }
        let j = i;
        for (const ch of chars) { if (j > 5) break; next[j++] = ch; } // handles paste
        setDigits(next);
        const focusAt = Math.min(j, 5);
        inputsRef.current[focusAt]?.focus();
        if (next.every(d => d)) connect(next.join(''));
      };

      const onKey = (i, e) => {
        if (e.key === 'Backspace' && !digits[i] && i > 0) inputsRef.current[i - 1]?.focus();
      };

      /* — render — */

      if (phase === 'enter') return (
        <div className="fade-in">
          <h1 className="hero">Receive a <em>file.</em></h1>
          <p className="sub">Enter the 6-character code shown on the sender's screen.</p>
          <div className="card">
            <div className="code-label">Room code</div>
            <div className="code-input-row">
              {digits.map((d, i) => (
                <input
                  key={i}
                  ref={el => inputsRef.current[i] = el}
                  className="code-input"
                  value={d}
                  maxLength={i === 0 ? 6 : 1}
                  autoFocus={i === 0}
                  autoComplete="off"
                  inputMode="text"
                  onChange={(e) => setDigit(i, e.target.value)}
                  onKeyDown={(e) => onKey(i, e)}
                />
              ))}
            </div>
            <button className="btn btn-gold" disabled={!digits.every(d => d)} onClick={() => connect(digits.join(''))}>
              {Icon.down('#fff')} Connect
            </button>
          </div>
        </div>
      );

      if (phase === 'connecting') return (
        <div className="card fade-in">
          <div className="waiting" style={{ padding: '26px 0' }}>
            <span className="pulse" /> Connecting to sender…
          </div>
        </div>
      );

      if (phase === 'offer') return (
        <div className="card fade-in">
          <div className="code-label">Incoming file</div>
          <FileMeta name={meta.name} size={meta.size} />
          <button className="btn btn-gold" onClick={accept}>
            {Icon.down('#fff')} Download now
          </button>
          <div className="waiting">Streams directly from the sender's device</div>
        </div>
      );

      if (phase === 'transfer') return (
        <div className="card fade-in">
          <FileMeta name={meta.name} size={meta.size} />
          <ProgressPanel bytes={received} total={meta.size} bps={bps} />
          <div className="waiting"><span className="pulse" /> Receiving peer-to-peer…</div>
        </div>
      );

      if (phase === 'done') return (
        <div className="card fade-in">
          <div className="done-icon">{Icon.check()}</div>
          <div className="done-title">File received</div>
          <div className="done-sub">
            {meta.name} · {fmtBytes(meta.size)}{savedToDisk ? ' — saved to disk.' : ' — check your downloads.'}
          </div>
          <button className="btn btn-dark" onClick={() => location.assign(location.pathname)}>Receive another</button>
        </div>
      );

      return (
        <div className="card fade-in">
          <div className="status-banner status-error">{error || 'Something went wrong.'}</div>
          <button className="btn btn-dark" onClick={() => location.assign(location.pathname)}>Try again</button>
        </div>
      );
    }

    /* ───────────────────────── app shell ───────────────────────── */

    function App() {
      const urlCode = new URLSearchParams(location.search).get('code');
      const [mode, setMode] = useState(urlCode ? 'receive' : 'send');
      const [toastMsg, setToastMsg] = useState('');
      const toastTimer = useRef(null);

      const toast = useCallback((msg) => {
        setToastMsg(msg);
        clearTimeout(toastTimer.current);
        toastTimer.current = setTimeout(() => setToastMsg(''), 2200);
      }, []);

      return (
        <div className="shell">
          {!urlCode && (
            <div className="mode-switch">
              <button className={mode === 'send' ? 'active' : ''} onClick={() => setMode('send')}>Send</button>
              <button className={mode === 'receive' ? 'active' : ''} onClick={() => setMode('receive')}>Receive</button>
            </div>
          )}

          <div className="stage">
            {mode === 'send'
              ? <SendFlow toast={toast} />
              : <ReceiveFlow initialCode={urlCode || null} toast={toast} />}
          </div>

          <footer className="foot">
            Files travel <b>directly between browsers</b> over encrypted WebRTC.<br />
            Nothing is ever uploaded or stored on a server.
          </footer>

          <Toast msg={toastMsg} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);

    // PWA service worker (needs https or localhost)
    if ('serviceWorker' in navigator && location.protocol !== 'file:') {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
