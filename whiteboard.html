  <style>
    html, body { overflow: hidden; }
    #board {
      position: fixed;
      top: 55px; left: 0; right: 0; bottom: 0;
    }
    /* Blend Excalidraw's UI into the cream theme.
       Doubled class beats Excalidraw's runtime-injected variable definitions. */
    .excalidraw.excalidraw {
      --color-primary: #C8A96E;
      --color-primary-darker: #B3934F;
      --color-primary-darkest: #9E7F3E;
      --color-primary-light: #F0E6D2;
      --color-primary-hover: #B3934F;
      --color-surface-primary-container: #F0EBE1;
      --island-bg-color: rgba(253, 250, 245, 0.96);
      --color-on-primary-container: #1A1A1A;
      --default-bg-color: #FDFAF5;
      --button-hover-bg: #F0EBE1;
      --sidebar-bg-color: #FDFAF5;
    }
    .excalidraw .App-menu_top .buttonList { border-radius: 14px; }
    #saved {
      position: fixed;
      right: 16px; bottom: 16px;
      z-index: 40;
      font-size: 11.5px; font-weight: 600;
      color: var(--muted);
      background: rgba(253, 250, 245, 0.92);
      border: 1px solid var(--line);
      padding: 6px 13px;
      border-radius: 99px;
      opacity: 0;
      transition: opacity 0.4s;
      pointer-events: none;
    }
    #saved.show { opacity: 1; }
    #fallback {
      position: fixed; inset: 55px 0 0 0;
      display: none;
      align-items: center; justify-content: center;
      text-align: center; color: var(--muted); font-size: 14px;
      padding: 30px;
    }

  <div id="board"></div>
  <div id="fallback">Couldn't load the canvas engine.<br />Check your internet connection and reload — drawings stay saved locally.</div>
  <div id="saved">Saved ✓</div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@excalidraw/excalidraw@0.17.6/dist/excalidraw.production.min.js"></script>
  <script>
    const KEY = 'rocket.whiteboard.v1';

    function loadSaved() {
      try { return JSON.parse(localStorage.getItem(KEY)) || null; }
      catch { return null; }
    }

    const savedBadge = document.getElementById('saved');
    let badgeTimer, saveTimer, lastSerialized = '';

    function persist(elements, appState) {
      const data = {
        elements: elements.filter(el => !el.isDeleted),
        appState: {
          viewBackgroundColor: appState.viewBackgroundColor,
          currentItemStrokeColor: appState.currentItemStrokeColor,
          gridSize: appState.gridSize || null,
        },
      };
      const json = JSON.stringify(data);
      if (json === lastSerialized) return;
      lastSerialized = json;
      localStorage.setItem(KEY, json);
      savedBadge.classList.add('show');
      clearTimeout(badgeTimer);
      badgeTimer = setTimeout(() => savedBadge.classList.remove('show'), 1200);
    }

    function start() {
      if (!window.ExcalidrawLib || !window.React) {
        document.getElementById('fallback').style.display = 'flex';
        return;
      }
      const saved = loadSaved();
      const App = () => React.createElement(ExcalidrawLib.Excalidraw, {
        initialData: {
          elements: (saved && saved.elements) || [],
          appState: Object.assign(
            { viewBackgroundColor: '#FDFAF5', currentItemStrokeColor: '#1A1A1A' },
            (saved && saved.appState) || {}
          ),
          scrollToContent: true,
        },
        theme: 'light',
        name: 'rocket-whiteboard',
        onChange: (elements, appState) => {
          clearTimeout(saveTimer);
          saveTimer = setTimeout(() => persist(elements, appState), 600);
        },
        UIOptions: {
          canvasActions: { loadScene: true, saveToActiveFile: false, toggleTheme: false },
        },
      });
      ReactDOM.createRoot(document.getElementById('board')).render(React.createElement(App));
    }

    document.getElementById('clearBtn').addEventListener('click', () => {
      if (confirm('Clear the whole board? This cannot be undone.')) {
        localStorage.removeItem(KEY);
        location.reload();
      }
    });

    window.addEventListener('load', start);

    if ('serviceWorker' in navigator && location.protocol !== 'file:') {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
    }
  </script>
